name: Daily Inventory Dashboard Update

on:
  schedule:
    - cron: '0 12 * * *'   # 7:00 AM US Eastern (UTC-5) = 12:00 UTC
  workflow_dispatch:        # also allows a manual "Run workflow" button in GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write Google credentials
        run: echo '${{ secrets.GOOGLE_CREDENTIALS_JSON }}' > /tmp/google_creds.json

      - name: Run dashboard update
        env:
          LWA_APP_ID:            ${{ secrets.LWA_APP_ID }}
          LWA_CLIENT_SECRET:     ${{ secrets.LWA_CLIENT_SECRET }}
          SP_API_REFRESH_TOKEN:  ${{ secrets.SP_API_REFRESH_TOKEN }}
          MARKETPLACE_ID:        ATVPDKIKX0DER
          FORECAST_SHEET_ID:     ${{ secrets.FORECAST_SHEET_ID }}
          GOOGLE_CREDENTIALS_PATH: /tmp/google_creds.json
          SLACK_WEBHOOK_URL:     ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python update_sheets.py

      - name: Save updated sales history back to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/sales_history.json data/reorder_state.json
          git diff --staged --quiet || git commit -m "chore: update sales history + reorder state [skip ci]"
          git push
